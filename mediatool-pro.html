<script>
(function(){
"use strict";

/* ══ API CONFIG ══════════════════════════════════════════ */
var KEY        = "1623f6fb98msh19b3e84650717cep1184c1jsne8eb1c781e41";
var MP3_HOST   = "youtube-mp36.p.rapidapi.com";
var YTAPI_HOST = "yt-api.p.rapidapi.com";

var TIKTOK_HOST= "tiktok-scraper7.p.rapidapi.com";
/* ═══════════════════════════════════════════════════════ */

var e=React.createElement, F=React.Fragment;
var useState=React.useState, useEffect=React.useEffect;

var PLATS=[
  {name:"YouTube",   icon:"▶", color:"#FF0000", re:/youtube\.com|youtu\.be/},
  {name:"Instagram", icon:"◈", color:"#E1306C", re:/instagram\.com/},
  {name:"TikTok",    icon:"♪", color:"#69C9D0", re:/tiktok\.com/},
  {name:"Facebook",  icon:"ƒ", color:"#1877F2", re:/facebook\.com|fb\.watch/},
  {name:"Twitter/X", icon:"✕", color:"#1DA1F2", re:/twitter\.com|x\.com/},
  {name:"Vimeo",     icon:"⬡", color:"#1AB7EA", re:/vimeo\.com/},
];

var PTS=(function(){
  var a=[];
  for(var i=0;i<18;i++) a.push({id:i,x:Math.random()*96+2,y:Math.random()*88+6,
    sz:Math.random()*3+1,sp:Math.random()*20+14,op:Math.random()*0.2+0.04,dl:-(Math.random()*28)});
  return a;
})();

function getPlatform(url){ for(var i=0;i<PLATS.length;i++) if(PLATS[i].re.test(url)) return PLATS[i]; return null; }
function getYTId(url){ var m=url.match(/(?:v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/); return m?m[1]:null; }
function gl(x){ return Object.assign({background:"rgba(255,255,255,.04)",backdropFilter:"blur(20px)",border:"1px solid rgba(255,255,255,.08)",borderRadius:16},x||{}); }
function hdr(host){ return{"x-rapidapi-host":host,"x-rapidapi-key":KEY,"Content-Type":"application/json"}; }

/* ── Particles ── */
function Particles(){
  return e("div",{style:{position:"fixed",inset:0,pointerEvents:"none",zIndex:0,overflow:"hidden"}},
    PTS.map(function(p){
      return e("div",{key:p.id,style:{position:"absolute",left:p.x+"%",top:p.y+"%",
        width:p.sz,height:p.sz,borderRadius:"50%",background:"#A855F7",opacity:p.op,
        animation:"floatUp "+p.sp+"s linear "+p.dl+"s infinite"}});
    }));
}

/* ── Alert Banner ── */
function Alert(props){
  if(!props.msg) return null;
  var pal={
    loading:{bg:"rgba(59,130,246,.1)",  bd:"rgba(59,130,246,.3)",  tx:"#60A5FA"},
    success:{bg:"rgba(16,185,129,.1)",  bd:"rgba(16,185,129,.3)",  tx:"#10B981"},
    error:  {bg:"rgba(239,68,68,.1)",   bd:"rgba(239,68,68,.3)",   tx:"#F87171"},
    warn:   {bg:"rgba(245,158,11,.1)",  bd:"rgba(245,158,11,.3)",  tx:"#FBB724"},
  }[props.type]||{bg:"rgba(59,130,246,.1)",bd:"rgba(59,130,246,.3)",tx:"#60A5FA"};
  return e("div",{className:"fade-in",style:{background:pal.bg,border:"1px solid "+pal.bd,
    borderRadius:12,padding:"12px 16px",marginBottom:14,
    display:"flex",alignItems:"center",gap:10,fontSize:13,color:pal.tx}},
    props.type==="loading"&&e("span",{className:"spin"},"⟳"),
    props.type==="success"&&e("span",null,"✓"),
    props.type==="error"  &&e("span",null,"⚠"),
    props.type==="warn"   &&e("span",null,"💡"),
    e("span",null,props.msg));
}

function ResultCard(props){
  if(!props.items||!props.items.length) return null;

}

  var _mtype=useState("loading"); var mtype=_mtype[0],setMtype=_mtype[1];
  var _items=useState(null); var items=_items[0],setItems=_items[1];

  var _sub  =useState(""); var sub=_sub[0],setSub=_sub[1];
  var _mode =useState("mp3"); var mode=_mode[0],setMode=_mode[1];
  var _qual =useState("720p"); var qual=_qual[0],setQual=_qual[1];

  useEffect(function(){
    var p=getPlatform(url); setPlat(p); setItems(null); setMsg(null);

      setPhase("ready");
      var vid=getYTId(url);
      if(vid) setThumb("https://img.youtube.com/vi/"+vid+"/hqdefault.jpg");
      else setThumb("https://picsum.photos/seed/"+encodeURIComponent(url.slice(-16))+"/640/360");
    } else { setPhase("idle"); setThumb(null); }
  },[url]);

  function setErr(m){ setPhase("error"); setMtype("error"); setMsg(m); }
  function setLoad(m){ setPhase("loading"); setMtype("loading"); setMsg(m||"Processando..."); setItems(null); }

  /* ── YouTube MP3 ── */
  function doMP3(){
    var vid=getYTId(url);
    if(!vid){ setErr("ID do vídeo não encontrado. Verifique o link."); return; }
    setLoad("Convertendo para MP3... aguarde ⏳");
    function attempt(cb){
      fetch("https://"+MP3_HOST+"/dl?id="+encodeURIComponent(vid),{method:"GET",headers:hdr(MP3_HOST)})
        .then(function(r){return r.json();}).then(cb)
        .catch(function(){ setErr("Erro de rede."); });
    }
    attempt(function(data){
      if(data&&data.status==="ok"&&data.link){
        setPhase("done"); setMsg(null);
        setItems([{label:"Baixar MP3",url:data.link,quality:"320kbps"}]);
        setSub((data.title||"Áudio")+" · MP3 · YouTube");
      } else if(data&&data.status==="processing"){
        setMsg("Servidor processando, aguarde... ⏳");
        setTimeout(function(){
          attempt(function(d2){
            if(d2&&d2.status==="ok"&&d2.link){
              setPhase("done"); setMsg(null);
              setItems([{label:"Baixar MP3",url:d2.link,quality:"320kbps"}]);
              setSub((d2.title||"Áudio")+" · MP3");
            } else setErr("Ainda processando. Tente novamente.");
          });
        },4500);
      } else setErr("Erro: "+(data&&(data.msg||data.message)||"Resposta inesperada."));
    });
  }

  /* ── YouTube MP4 ── */
  function doMP4(){
    var vid=getYTId(url);
    if(!vid){ setErr("ID do vídeo não encontrado."); return; }
    setLoad("Buscando formatos de vídeo... 🎬");
    fetch("https://"+YTAPI_HOST+"/dl?id="+encodeURIComponent(vid),{method:"GET",headers:hdr(YTAPI_HOST)})
      .then(function(r){return r.json();})
      .then(function(data){
        console.log("YT MP4:",JSON.stringify(data).slice(0,600));
        var links=[];
        function tryAdd(arr){
          if(!Array.isArray(arr)) return;
          arr.forEach(function(f){
            if(f.url&&(f.mimeType||"").indexOf("video/mp4")>-1&&f.qualityLabel)
              links.push({label:"Baixar "+f.qualityLabel,url:f.url,quality:f.qualityLabel});
          });
        }
        if(data&&data.formats) tryAdd(data.formats);
        if(data&&data.adaptiveFormats) tryAdd(data.adaptiveFormats);
        if(!links.length&&data&&data.url) links.push({label:"Baixar Vídeo",url:data.url,quality:"HD"});
        if(!links.length&&data&&data.links){
          Object.keys(data.links).forEach(function(k){
            var v=data.links[k]; var u=typeof v==="string"?v:(v&&v.url);
            if(u) links.push({label:"Baixar "+k,url:u,quality:k});
          });
        }
        var pref=links.filter(function(l){return l.quality&&l.quality.indexOf(qual)>-1;});
        var final=pref.length?pref:links.slice(0,5);
        if(final.length){
          setPhase("done"); setMsg(null);
          setItems(final); setSub((data.title||"Vídeo")+" · MP4 · YouTube");
        } else {
          // fallback /video endpoint
          fetch("https://"+YTAPI_HOST+"/video?id="+encodeURIComponent(vid),{method:"GET",headers:hdr(YTAPI_HOST)})
            .then(function(r2){return r2.json();})
            .then(function(d2){
              var lks=[];
              if(d2&&d2.streamingData){
                var arr=(d2.streamingData.formats||[]).concat(d2.streamingData.adaptiveFormats||[]);
                arr.forEach(function(f){
                  if(f.url&&(f.mimeType||"").indexOf("video/mp4")>-1&&f.qualityLabel)
                    lks.push({label:"Baixar "+f.qualityLabel,url:f.url,quality:f.qualityLabel});
                });
              }
              if(lks.length){ setPhase("done"); setMsg(null); setItems(lks.slice(0,5)); setSub((d2.videoDetails&&d2.videoDetails.title||"Vídeo")+" · MP4"); }
              else setErr("Não foi possível obter os links de download. Verifique o console (F12).");
            }).catch(function(){ setErr("Erro ao buscar formatos de vídeo."); });
        }
      }).catch(function(){ setErr("Erro de rede ao buscar o vídeo."); });
  }

  /* ── Instagram ── */
  function doInstagram(){
    setLoad("Buscando mídia do Instagram... 📸");
    fetch("https://"+INSTA_HOST+"/index?url="+encodeURIComponent(url),{method:"GET",headers:hdr(INSTA_HOST)})
      .then(function(r){return r.json();})
      .then(function(data){
        console.log("Instagram:",JSON.stringify(data).slice(0,600));
        var links=[];
        function addLink(u,i,type){
          if(u&&typeof u==="string"&&u.startsWith("http"))
            links.push({label:"Baixar "+(type||"Mídia")+(links.length>0?" "+(links.length+1):""),url:u,quality:"HD"});
        }
        if(Array.isArray(data)) data.forEach(function(item,i){ addLink(item.url||item.video_url||item.download_url||item.src,i,item.type); });
        else if(data&&data.result){
          var r=data.result;
          if(Array.isArray(r)) r.forEach(function(item,i){ addLink(item.url||item.video_url,i); });
          else addLink(r.url||r.video_url,0);
        }
        else if(data&&data.media){ var m=Array.isArray(data.media)?data.media:[data.media]; m.forEach(function(item,i){ addLink(item.url||item.video_url,i); }); }
        else addLink(data&&(data.url||data.video_url||data.download_url),0);
        if(links.length){ setPhase("done"); setMsg(null); setItems(links); setSub("Instagram · "+links.length+" arquivo(s)"); }
        else setErr("Nenhum link encontrado. O post precisa ser público.");
      }).catch(function(){ setErr("Erro de conexão com a API do Instagram."); });
  }

  /* ── TikTok ── */
  function doTikTok(){
    setLoad("Buscando vídeo do TikTok... 🎵");
    // tiktok-scraper7: endpoint /video/info?url=...
    fetch("https://"+TIKTOK_HOST+"/video/info?url="+encodeURIComponent(url),{
      method:"GET", headers:hdr(TIKTOK_HOST)
    })
    .then(function(r){return r.json();})
    .then(function(data){
      console.log("TikTok response:", JSON.stringify(data).slice(0,800));
      var links=[];

      // Shape 1: data.data.play / data.data.wmplay
      if(data&&data.data){
        var d=data.data;
        if(d.play)   links.push({label:"Baixar Vídeo (sem marca d'água)", url:d.play,   quality:"HD"});
        if(d.wmplay) links.push({label:"Baixar Vídeo (com marca d'água)", url:d.wmplay, quality:"HD"});
        if(d.music)  links.push({label:"Baixar Áudio MP3",                url:d.music,  quality:"MP3"});
      }
      // Shape 2: data.play / data.wmplay
      else if(data&&data.play){
        if(data.play)   links.push({label:"Baixar Vídeo (sem marca d'água)", url:data.play,   quality:"HD"});
        if(data.wmplay) links.push({label:"Baixar Vídeo (com marca d'água)", url:data.wmplay, quality:"HD"});
        if(data.music)  links.push({label:"Baixar Áudio MP3",                url:data.music,  quality:"MP3"});
      }
      // Shape 3: data.result
      else if(data&&data.result){
        var r=data.result;
        if(r.play)   links.push({label:"Baixar Vídeo",url:r.play,quality:"HD"});
        if(r.wmplay) links.push({label:"Baixar com marca d'água",url:r.wmplay,quality:"HD"});
        if(r.music)  links.push({label:"Baixar Áudio",url:r.music,quality:"MP3"});
      }

      if(links.length){
        setPhase("done"); setMsg(null);
        setItems(links);
        var title=(data&&data.data&&data.data.title)||(data&&data.title)||"Vídeo TikTok";
        setSub(title+" · TikTok");
      } else {
        // try alternate endpoint: /video/no_watermark
        fetch("https://"+TIKTOK_HOST+"/video/no_watermark?url="+encodeURIComponent(url),{
          method:"GET", headers:hdr(TIKTOK_HOST)
        })
        .then(function(r2){return r2.json();})
        .then(function(d2){
          console.log("TikTok no_watermark:", JSON.stringify(d2).slice(0,600));
          var lks2=[];
          if(d2&&d2.data&&d2.data.play) lks2.push({label:"Baixar Vídeo HD",url:d2.data.play,quality:"HD"});
          if(d2&&d2.url) lks2.push({label:"Baixar Vídeo",url:d2.url,quality:"HD"});
          if(lks2.length){ setPhase("done"); setMsg(null); setItems(lks2); setSub("TikTok · Vídeo"); }
          else setErr("Não foi possível obter o vídeo. Verifique se o link é público. Detalhes no console (F12).");
        })
        .catch(function(){ setErr("Erro ao buscar vídeo do TikTok."); });
      }
    })
    .catch(function(){ setErr("Erro de rede ao acessar a API do TikTok."); });
  }

  /* ── Thumbnail ── */
  function doThumb(){
    var vid=getYTId(url);
    if(vid){ window.open("https://img.youtube.com/vi/"+vid+"/maxresdefault.jpg","_blank"); setMtype("success"); setMsg("Thumbnail aberta! Botão direito → Salvar imagem."); }

    else if(n==="Instagram") doInstagram();

    else { setMtype("warn"); setMsg("Suporte a "+n+" em breve!"); }

  var isYT    = plat&&plat.name==="YouTube";

  /* ── Render ── */
  return e("div",{style:{minHeight:"100vh",background:"#060612",position:"relative",overflowX:"hidden"}},
    e("div",{style:{position:"fixed",inset:0,zIndex:0,pointerEvents:"none",
      background:"radial-gradient(ellipse 80% 60% at 15% 10%,#1a0a3a,transparent 60%),radial-gradient(ellipse 60% 50% at 85% 85%,#0a1a2e,transparent 60%)"}}),
    e("div",{style:{position:"fixed",inset:0,zIndex:0,pointerEvents:"none",
      backgroundImage:"linear-gradient(rgba(168,85,247,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(168,85,247,.04) 1px,transparent 1px)",
      backgroundSize:"48px 48px"}}),
    e(Particles),

    e("div",{style:{position:"relative",zIndex:1,maxWidth:820,margin:"0 auto",padding:"0 20px 56px"}},

      /* Header */
      e("header",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"26px 0 14px",flexWrap:"wrap",gap:12}},
        e("div",{style:{display:"flex",alignItems:"center",gap:12}},
          e("span",{style:{fontSize:26,color:"#A855F7"}},"⬡"),
          e("div",null,
            e("div",{style:{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:19,color:"#fff"}},
              "MediaTool ",e("span",{style:{background:"linear-gradient(90deg,#A855F7,#3B82F6)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}},"Pro")),
            e("div",{style:{fontSize:10,color:"#ffffff44",marginTop:1}},"Para criadores de conteúdo"))),
        e("div",{style:{background:"rgba(16,185,129,.1)",border:"1px solid rgba(16,185,129,.25)",borderRadius:20,padding:"4px 12px",fontSize:11,color:"#10B981"}},"● API Online")
      ),

      /* Hero */
      e("div",{className:"fade-in",style:{textAlign:"center",padding:"22px 0 20px"}},
        e("div",{style:{display:"inline-flex",alignItems:"center",gap:8,background:"rgba(168,85,247,.1)",
          border:"1px solid rgba(168,85,247,.25)",borderRadius:20,padding:"5px 14px",fontSize:12,color:"#A855F7",marginBottom:14}},
          "🚀 YouTube · Instagram · TikTok · e mais"),

          "Baixe vídeos e áudios",e("br"),e("span",{className:"shimmer-text"},"de qualquer rede social")),
        e("p",{style:{fontSize:13,color:"#ffffff44"}},"Cole o link · Escolha o formato · Baixe grátis")
      ),

      /* URL Input */
      e("div",{className:"fade-in",style:gl({padding:18,marginBottom:12})},

        plat&&e("div",{style:{display:"flex",alignItems:"center",gap:6,marginTop:9,fontSize:12,
          color:(isYT||isInsta||isTT)?"#10B981":"#F59E0B"}},
          e("span",{style:{width:7,height:7,borderRadius:"50%",background:plat.color,display:"inline-block"}}),
          isYT   ?"YouTube detectado — MP3 e MP4 disponíveis ✓":
          isInsta?"Instagram detectado — Fotos, Vídeos e Reels ✓":
          isTT   ?"TikTok detectado — download disponível ✓":
                  plat.name+" detectado — suporte em breve")
      ),

      /* Mode (YouTube only) */
      isYT&&canAct&&e("div",{className:"fade-in",style:{display:"flex",gap:8,marginBottom:12}},
        [["mp3","🎵 MP3 (áudio)"],["mp4","🎬 MP4 (vídeo)"]].map(function(row){
          var m=row[0],lbl=row[1],active=mode===m;
          return e("button",{key:m,onClick:function(){setMode(m);setItems(null);setMsg(null);},className:"mode-btn",style:{
            flex:1,padding:"10px",border:"1px solid "+(active?"#A855F7":"rgba(255,255,255,.1)"),
            borderRadius:10,background:active?"rgba(168,85,247,.12)":"rgba(255,255,255,.03)",
            color:active?"#A855F7":"#ffffff55",fontSize:13,cursor:"pointer",
            fontFamily:"'Syne',sans-serif",fontWeight:active?700:400}},lbl);
        })
      ),

      /* Quality (MP4 only) */
      isYT&&canAct&&mode==="mp4"&&e("div",{className:"fade-in",style:{display:"flex",gap:6,marginBottom:12,flexWrap:"wrap"}},
        ["360p","480p","720p","1080p"].map(function(q){
          var active=qual===q;
          return e("button",{key:q,onClick:function(){setQual(q);},className:"q-btn",style:{
            padding:"7px 14px",border:"1px solid "+(active?"#3B82F6":"rgba(255,255,255,.1)"),
            borderRadius:8,background:active?"rgba(59,130,246,.12)":"rgba(255,255,255,.03)",
            color:active?"#3B82F6":"#ffffff44",fontSize:12,cursor:"pointer",
            fontFamily:"'DM Sans',sans-serif",fontWeight:active?600:400}},q);
        })
      ),

      /* Preview */
      (canAct||phase==="loading"||phase==="done")&&thumb&&e("div",{className:"fade-in",style:gl({overflow:"hidden",display:"flex",flexWrap:"wrap",marginBottom:12})},
        e("div",{style:{position:"relative",flexShrink:0,width:190,minWidth:130}},
          e("img",{src:thumb,alt:"thumb",onError:function(ev){ev.target.style.display="none";},
            style:{width:"100%",height:110,objectFit:"cover",display:"block"}}),
          e("div",{style:{position:"absolute",inset:0,display:"flex",alignItems:"center",
            justifyContent:"center",background:"rgba(0,0,0,.3)",fontSize:22,color:"#fff"}},plat&&plat.icon)),
        e("div",{style:{padding:16,display:"flex",flexDirection:"column",gap:6,justifyContent:"center",flex:1}},
          e("div",{style:{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:13,color:"#fff"}},
            isYT?"Vídeo do YouTube":isInsta?"Publicação do Instagram":isTT?"Vídeo do TikTok":"Mídia"),
          e("div",{style:{fontSize:11,color:"#ffffff44"}},
            e("span",{style:{color:plat&&plat.color}},plat&&plat.name),
            isYT?" · MP3 e MP4 disponíveis":isInsta?" · Foto/Vídeo/Reels":isTT?" · Com e sem marca d'água":""),
          e("div",{style:{display:"flex",gap:5,flexWrap:"wrap",marginTop:4}},
            (isYT?["✓ MP3 320kbps","✓ MP4 até 1080p","✓ Thumbnail"]:
             isInsta?["✓ Foto","✓ Vídeo","✓ Reels"]:
             isTT?["✓ Sem marca d'água","✓ Com marca d'água","✓ Áudio MP3"]:[]).map(function(t){
              return e("span",{key:t,style:{background:"rgba(16,185,129,.1)",border:"1px solid rgba(16,185,129,.25)",
                color:"#10B981",borderRadius:5,padding:"2px 7px",fontSize:10}},t);
            }))
        )
      ),

      /* Alert */
      msg&&phase!=="done"&&e(Alert,{msg:msg,type:mtype}),

      /* Buttons */
      canAct&&e("div",{className:"fade-in",style:{display:"flex",flexDirection:"column",gap:9,marginBottom:18}},
        e("button",{onClick:handleDownload,disabled:!url||!plat,className:"dl-btn",style:{
          width:"100%",padding:"16px 24px",border:"none",borderRadius:13,
          color:"#fff",fontSize:15,fontFamily:"'Syne',sans-serif",fontWeight:700,
          cursor:(url&&plat)?"pointer":"not-allowed",
          display:"flex",alignItems:"center",justifyContent:"center",gap:10,
          background:isInsta?"linear-gradient(135deg,#E1306C,#833AB4)":
                     isTT   ?"linear-gradient(135deg,#69C9D0,#010101)":
                     mode==="mp4"?"linear-gradient(135deg,#3B82F6,#1D4ED8)":
                                  "linear-gradient(135deg,#A855F7,#6D28D9)",
          opacity:(url&&plat)?1:.42,
          boxShadow:(url&&plat)?"0 8px 28px rgba(100,100,200,.2)":"none"}},
          e("span",{style:{fontSize:19}},isInsta?"📥":isTT?"♪":mode==="mp4"?"🎬":"🎵"),
          isInsta?"Baixar do Instagram":
          isTT   ?"Baixar do TikTok":
          mode==="mp4"?"Baixar MP4 ("+qual+")":"Baixar como MP3",
          e("span",{style:{marginLeft:"auto"}},"→")
        ),
        isYT&&e("button",{onClick:doThumb,style:{
          width:"100%",padding:"11px 24px",border:"1px solid rgba(245,158,11,.3)",borderRadius:13,
          color:"#F59E0B",fontSize:13,fontFamily:"'Syne',sans-serif",fontWeight:600,cursor:"pointer",
          background:"rgba(245,158,11,.05)",display:"flex",alignItems:"center",justifyContent:"center",gap:8
        }},"🖼️  Abrir Thumbnail HD")
      ),

      /* Loading */
      phase==="loading"&&e("div",{className:"fade-in",style:gl({padding:28,marginBottom:18,textAlign:"center"})},
        e("div",{className:"spin",style:{fontSize:30,marginBottom:10}},"⟳"),
        e("div",{style:{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:15,color:"#fff",marginBottom:5}},"Processando..."),
        e("div",{className:"pulse",style:{fontSize:12,color:"#ffffff44"}},msg||"Aguarde...")
      ),

      /* Result */
      phase==="done"&&e(ResultCard,{items:items,subtitle:sub,onReset:function(){
        setUrl("");setPlat(null);setPhase("idle");setItems(null);setMsg(null);setThumb(null);}}),

      /* Idle info cards */
      phase==="idle"&&e("div",{className:"fade-in",style:{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(165px,1fr))",gap:10,marginTop:8}},
        [{icon:"🎵",title:"YouTube MP3",desc:"Até 320kbps",color:"#A855F7",ok:true},
         {icon:"🎬",title:"YouTube MP4",desc:"360p · 480p · 720p · 1080p",color:"#3B82F6",ok:true},
         {icon:"📸",title:"Instagram",desc:"Fotos, Vídeos e Reels",color:"#E1306C",ok:true},
         {icon:"♪",title:"TikTok",desc:"Sem/com marca d'água + áudio",color:"#69C9D0",ok:true},
         {icon:"ƒ",title:"Facebook",desc:"Em breve",color:"#1877F2",ok:false},
         {icon:"⬡",title:"Vimeo",desc:"Em breve",color:"#1AB7EA",ok:false},
        ].map(function(item){
          return e("div",{key:item.title,style:{background:"rgba(255,255,255,.025)",
            border:"1px solid rgba(255,255,255,.06)",borderRadius:12,padding:"14px 16px",opacity:item.ok?1:.45}},
            e("div",{style:{fontSize:20,marginBottom:6}},item.icon),
            e("div",{style:{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:13,color:"#fff",marginBottom:3}},item.title),
            e("div",{style:{fontSize:11,color:"#ffffff44"}},item.desc),
            e("div",{style:{marginTop:8,fontSize:10,fontWeight:600,color:item.ok?"#10B981":"#ffffff33"}},
              item.ok?"✓ Disponível":"⏳ Em breve"));
        })
      ),

      e("footer",{style:{borderTop:"1px solid rgba(255,255,255,.06)",marginTop:40,paddingTop:18,
        display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10}},
        e("div",{style:{fontSize:11,color:"#ffffff22"}},"© 2026 MediaTool Pro · Uso educacional e criativo"),
        e("div",{style:{fontSize:11,color:"#ffffff22"}},"Powered by RapidAPI"))
    ));
}

ReactDOM.createRoot(document.getElementById("root")).render(e(App));
})();
</script>
</body>
</html>
