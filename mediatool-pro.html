/* Fetch with RapidAPI headers, CORS-safe */
function rapidFetch(host, path){
  var fullUrl = "https://"+host+path;
  // Try direct first (works if API has CORS headers)
  return fetch(fullUrl, {method:"GET", headers:hdr(host)})
    .then(function(r){

/* Deduplicate links by quality label, keep best (prefer higher res) */
function dedupeLinks(links){
  var seen={};
  var out=[];
  // sort descending by quality number so we keep highest
  var sorted=links.slice().sort(function(a,b){
    var na=parseInt(a.quality)||0, nb=parseInt(b.quality)||0;
    return nb-na;
  });
  sorted.forEach(function(item){
    var key=(item.quality||item.label||"").toLowerCase().replace(/\s/g,"");
    if(!seen[key]){ seen[key]=true; out.push(item); }
  });
  return out;
}

/* Force download via fetch → blob → <a download> */
function forceDownload(url, filename, onStart, onDone, onError) {
  onStart && onStart();
  // Try fetch+blob first (works for same-origin or CORS-enabled URLs)
  fetch(url)
    .then(function(r){
      if(!r.ok) throw new Error("HTTP "+r.status);
      return r.blob();
    })
    .then(function(blob){
      var burl = URL.createObjectURL(blob);
      var a = document.createElement("a");
      a.href = burl;
      a.download = filename||"mediatool-download";
      document.body.appendChild(a);
      a.click();
      setTimeout(function(){ URL.revokeObjectURL(burl); document.body.removeChild(a); }, 2000);
      onDone && onDone();
    })
    .catch(function(){
      // CORS blocked — fallback: open in new tab with download hint
      var a = document.createElement("a");
      a.href = url;
      a.download = filename||"mediatool-download";
      a.target = "_blank";
      a.rel = "noopener noreferrer";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      onDone && onDone();
    });
}

  function doFFmpegMerge(videoUrl, audioUrl, quality, title){
    setPhase("merging");
    setMsg("Iniciando FFmpeg no navegador... ⚙️");
    setMtype("loading");

    var FFmpeg = window.FFmpegWASM && window.FFmpegWASM.FFmpeg;
    var fetchFile = window.FFmpegUtil && window.FFmpegUtil.fetchFile;

    if(!FFmpeg || !fetchFile){
      // FFmpeg not loaded yet — fallback to separate downloads
      setPhase("done"); setMsg(null);
      setItems([
        {label:"Baixar Vídeo "+quality+" (sem áudio)", url:videoUrl, quality:quality},
        {label:"Baixar Áudio separado", url:audioUrl, quality:"AAC"},
      ]);
      setSub(title+" · FFmpeg não carregou — baixe separado");
      setMtype("warn");
      setMsg("FFmpeg não carregou. Baixe os dois arquivos separados e combine no CapCut.");
      return;
    }

    var ffmpeg = new FFmpeg();
    var mergeProgress = 0;

    ffmpeg.on("progress", function(p){
      mergeProgress = Math.round((p.progress||0)*100);
      setMergeProgress(mergeProgress);
      setMsg("Combinando vídeo e áudio... "+mergeProgress+"%");
    });

    ffmpeg.on("log", function(l){ console.log("[FFmpeg]", l.message); });

    setMsg("Carregando FFmpeg (pode levar ~10s na primeira vez)... ⏳");

    ffmpeg.load({
      coreURL: "https://unpkg.com/@ffmpeg/core@0.12.6/dist/umd/ffmpeg-core.js",
      wasmURL: "https://unpkg.com/@ffmpeg/core@0.12.6/dist/umd/ffmpeg-core.wasm",
    })
    .then(function(){
      setMsg("Baixando vídeo "+quality+"... (pode demorar) ⬇️");
      return fetchFile(videoUrl);
    })
    .then(function(videoData){
      return ffmpeg.writeFile("video.mp4", videoData)
        .then(function(){
          setMsg("Baixando áudio... ⬇️");
          return fetchFile(audioUrl);
        })
        .then(function(audioData){
          return ffmpeg.writeFile("audio.mp4", audioData);
        });
    })
    .then(function(){
      setMsg("Combinando vídeo + áudio com FFmpeg... 🔧");
      return ffmpeg.exec([
        "-i","video.mp4",
        "-i","audio.mp4",
        "-c:v","copy",
        "-c:a","aac",
        "-shortest",
        "output.mp4"
      ]);
    })
    .then(function(){
      setMsg("Gerando arquivo final... ✅");
      return ffmpeg.readFile("output.mp4");
    })
    .then(function(data){
      var blob = new Blob([data.buffer], {type:"video/mp4"});
      var burl = URL.createObjectURL(blob);
      var a = document.createElement("a");
      a.href = burl;
      a.download = (title||"video")+"-"+quality+".mp4";
      document.body.appendChild(a);
      a.click();
      setTimeout(function(){ URL.revokeObjectURL(burl); document.body.removeChild(a); }, 3000);
      setPhase("done");
      setMsg(null);
      setItems([{label:"✅ "+quality+" com áudio — baixado!", url:burl, quality:quality}]);
      setSub(title+" · "+quality+" · MP4 com áudio ✓");
    })
    .catch(function(err){
      console.error("FFmpeg error:", err);
      // Fallback: offer separate downloads
      setPhase("done");
      setItems([
        {label:"Baixar Vídeo "+quality+" (sem áudio)", url:videoUrl, quality:quality},
        {label:"Baixar Áudio separado", url:audioUrl, quality:"AAC"},
      ]);
      setSub(title+" · Merge falhou — baixe separado");
      setMtype("warn");
      setMsg("Merge automático falhou (CORS). Baixe os dois arquivos e combine no CapCut ou outro editor.");
    });
  }

    setLoad("Buscando mídia do Instagram... 📸");
    rapidFetch(INSTA_HOST, "/index?url="+encodeURIComponent(url))
      .then(function(r){return r.json();})
      .then(function(data){
        console.log("Instagram:",JSON.stringify(data).slice(0,600));
        var links=[];
        function addLink(u,label){
          if(u&&typeof u==="string"&&u.startsWith("http"))
            links.push({label:label||"Baixar Mídia",url:u,quality:"HD"});
        }
        if(Array.isArray(data)) data.forEach(function(item,i){ addLink(item.url||item.video_url||item.download_url,"Baixar Mídia "+(i+1)); });
        else if(data&&data.result){
          var r=data.result;
          if(Array.isArray(r)) r.forEach(function(item,i){ addLink(item.url||item.video_url,"Baixar Mídia "+(i+1)); });
          else addLink(r.url||r.video_url,"Baixar Mídia");
        }
        else if(data&&data.media){ var m=Array.isArray(data.media)?data.media:[data.media]; m.forEach(function(item,i){ addLink(item.url||item.video_url,"Baixar Mídia "+(i+1)); }); }
        else addLink(data&&(data.url||data.video_url||data.download_url),"Baixar Mídia");
        if(links.length) finish(dedupeLinks(links),"Instagram · "+links.length+" arquivo(s)");
        else setErr("Nenhum link encontrado. O post precisa ser público.");
      }).catch(function(){ setErr("Erro de conexão com Instagram."); });
  }

  /* ── TikTok ── */
  function doTikTok(){
    setLoad("Buscando vídeo do TikTok... ♪");

    // Clean URL: strip all query params
    var cleanUrl = url.split("?")[0].split("&")[0];
    var vidMatch = cleanUrl.match(/(https:\/\/www\.tiktok\.com\/@[^\/]+\/video\/\d+)/);
    if(vidMatch) cleanUrl = vidMatch[1];
    console.log("TikTok cleanUrl:", cleanUrl);

    function extractLinks(data){
      var links=[];
      var candidates=[data, data&&data.data, data&&data.result, data&&data.video, data&&data.aweme_detail];
      candidates.forEach(function(src){
        if(!src||typeof src!=="object") return;
        if(src.play&&typeof src.play==="string"&&src.play.startsWith("http"))
          links.push({label:"Baixar Vídeo (sem marca d\'água)",url:src.play,quality:"HD"});
        if(src.wmplay&&typeof src.wmplay==="string"&&src.wmplay.startsWith("http"))
          links.push({label:"Baixar Vídeo (com marca d\'água)",url:src.wmplay,quality:"HD"});
        if(src.music&&typeof src.music==="string"&&src.music.startsWith("http"))
          links.push({label:"Baixar Áudio MP3",url:src.music,quality:"MP3"});
        if(src.download_url&&typeof src.download_url==="string"&&src.download_url.startsWith("http")&&!links.length)
          links.push({label:"Baixar Vídeo HD",url:src.download_url,quality:"HD"});
        if(src.url&&typeof src.url==="string"&&src.url.startsWith("http")&&!links.length)
          links.push({label:"Baixar Vídeo",url:src.url,quality:"HD"});
      });
      var seen={};
      return links.filter(function(l){if(seen[l.url])return false;seen[l.url]=true;return true;});
    }

    function getTitle(data){
      var src=data&&(data.data||data.result||data.aweme_detail||data);
      if(!src) return "Vídeo TikTok";
      return src.title||src.desc||(src.author&&src.author.nickname)||"Vídeo TikTok";
    }

    // API 1: tiktok-scraper7 — 3 endpoints
    function tryScraperEndpoint(ep, next){
      rapidFetch(TIKTOK_HOST, ep+encodeURIComponent(cleanUrl))
        .then(function(r){return r.json();})
        .then(function(d){
          console.log("TikTok scraper7 ["+ep+"]:",JSON.stringify(d).slice(0,600));
          var lks=extractLinks(d);
          if(lks.length) finish(lks,getTitle(d)+" · TikTok");
          else if(next) next();
          else tryAPI2();
        })
        .catch(function(){if(next)next();else tryAPI2();});
    }

    // API 2: tiktok-download-without-watermark (backup)
    function tryAPI2(){
      rapidFetch(TIKTOK2_HOST, "/analysis?url="+encodeURIComponent(cleanUrl)+"&hd=1")
      .then(function(r){return r.json();})
      .then(function(d){
        console.log("TikTok API2:",JSON.stringify(d).slice(0,600));
        var lks=extractLinks(d);
        if(lks.length) finish(lks,getTitle(d)+" · TikTok");
        else setErr("Não foi possível obter o vídeo. Verifique se o link é público e tente novamente.");
      })
      .catch(function(){setErr("Erro ao acessar API de backup do TikTok.");});
    }

    tryScraperEndpoint("/video/info?url=",function(){
      tryScraperEndpoint("/video/no_watermark?url=",function(){
        tryScraperEndpoint("/video/data?url=",null);
      });
    });
  }
